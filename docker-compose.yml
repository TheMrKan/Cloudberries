services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cloudberries
      POSTGRES_USER: cloudberries
      POSTGRES_PASSWORD: cloudberries
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudberries -d cloudberries"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: "cloudberries-secret-key"

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_URL: postgresql+asyncpg://cloudberries:cloudberries@postgres:5432/cloudberries
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: cloudberries-secret-key
      PYTHONUNBUFFERED: 1
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

volumes:
  pgdata:
  qdrant_data: