services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cloudberries
      POSTGRES_USER: cloudberries
      POSTGRES_PASSWORD: cloudberries
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: "cloudberries-secret-key"

volumes:
  pgdata:
  qdrant_data: