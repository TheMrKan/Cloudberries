services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cloudberries
      POSTGRES_USER: cloudberries
      POSTGRES_PASSWORD: cloudberries
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudberries -d cloudberries"]
      interval: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.6
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build: ./core_service
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./core_service/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: >
        sh -c "uvicorn src.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./front_service
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  pgdata:
  qdrant_data: