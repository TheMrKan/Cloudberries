<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloudberries Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
  #app { width: 600px; height: 80vh; background: white; border-radius: 12px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.4; font-size: 14px; white-space: pre-wrap; }
  .msg.user { background: #007aff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.bot { background: #e9e9eb; color: #1c1c1e; align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg .meta { font-size: 11px; opacity: 0.6; margin-top: 4px; }
  #input-bar { display: flex; padding: 12px 20px; border-top: 1px solid #e5e5ea; gap: 8px; }
  #input-bar input { flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid #c7c7cc; outline: none; font-size: 14px; }
  #input-bar button { padding: 8px 20px; border-radius: 20px; border: none; background: #007aff; color: white; cursor: pointer; font-size: 14px; }
  #input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
  #loading { display: none; text-align: center; padding: 8px; color: #8e8e93; font-size: 13px; }
  #services { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .service-card { padding: 10px 14px; background: #f0f4ff; border-radius: 8px; border: 1px solid #d0d9f0; font-size: 13px; }
  .service-card .name { font-weight: 600; }
  .service-card .provider { color: #555; }
  .service-card .scores { color: #007aff; font-size: 12px; margin-top: 4px; }
  .service-card .tags { color: #e67e22; font-size: 12px; margin-top: 4px; }
  .service-card .rationale { color: #333; font-size: 12px; margin-top: 4px; font-style: italic; }
</style>
</head>
<body>
<div id="app">
  <div id="messages"></div>
  <div id="loading">Бот печатает...</div>
  <div id="input-bar">
    <input id="input" type="text" placeholder="Напишите сообщение..." autofocus>
    <button id="send-btn">Отправить</button>
  </div>
</div>
<script>
let sessionId = crypto.randomUUID();
let loading = false;
let pendingServices = [];

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const loadingEl = document.getElementById('loading');

function addMessage(role, text, services) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  const textEl = document.createElement('div');
  textEl.textContent = text;
  el.appendChild(textEl);
  if (services && services.length) {
    const svcDiv = document.createElement('div');
    svcDiv.id = 'services';
    svcDiv.style = 'margin-top: 8px;';
    services.forEach(s => {
      svcDiv.innerHTML += `<div class="service-card">
        <div class="name">${s.name}</div>
        <div class="provider">${s.provider}</div>
        ${s.rationale ? `<div class="rationale">${s.rationale}</div>` : ''}
        ${s.matched_keywords?.length ? `<div class="tags">Совпало: ${s.matched_keywords.join(', ')}</div>` : ''}
        <div class="scores">${Object.entries(s.scores).map(([k,v]) => `${k}: ${v}`).join(' · ')}</div>
      </div>`;
    });
    el.appendChild(svcDiv);
  }
  el.innerHTML += `<div class="meta">${role === 'user' ? 'Вы' : 'Бот'}</div>`;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function send(text) {
  if (!sessionId || loading) return;
  loading = true;
  loadingEl.style.display = 'block';
  sendBtn.disabled = true;
  inputEl.disabled = true;

  addMessage('user', text);
  inputEl.value = '';

  pendingServices = [];
  let botMessageEl = null;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, message: text }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let botText = '';
    let eventType = '';
    let eventData = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7);
          continue;
        }
        if (line.startsWith('data: ')) {
          eventData = line.slice(6);
          continue;
        }
        if (line === '') {
          if (eventType === 'search_result') {
            try { pendingServices.push(JSON.parse(eventData)); } catch {}
          } else if (eventType === 'token') {
            botText += JSON.parse(eventData);
          }
          eventType = '';
          eventData = '';
        }
      }
    }
    if (botText) {
      addMessage('bot', botText);
    }
  } catch (err) {
    addMessage('bot', 'Ошибка соединения');
  } finally {
    if (pendingServices.length) {
      addMessage('bot', 'Подходящие варианты:', pendingServices);
    }
    loading = false;
    loadingEl.style.display = 'none';
    sendBtn.disabled = false;
    inputEl.disabled = false;
    inputEl.focus();
  }
}

sendBtn.onclick = () => { const t = inputEl.value.trim(); if (t) send(t); };
inputEl.onkeydown = e => { if (e.key === 'Enter') sendBtn.click(); };
</script>
</body>
</html>
